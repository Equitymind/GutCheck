<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to GutCheck Premium!</title>
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #08060F;
      color: #e8e6f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .success-card {
      background: #110e1a;
      border: 1px solid #1e1a2e;
      border-radius: 12px;
      padding: 48px;
      text-align: center;
      max-width: 500px;
    }

    .checkmark {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: rgba(34, 197, 94, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 40px;
    }

    h1 {
      font-size: 2rem;
      font-weight: 800;
      margin-bottom: 16px;
      color: #fff;
    }

    p {
      font-size: 1.05rem;
      color: #9b97a8;
      line-height: 1.7;
      margin-bottom: 32px;
    }

    .btn {
      display: inline-block;
      padding: 14px 32px;
      background: #6366f1;
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-weight: 600;
      transition: background 0.2s;
    }

    .btn:hover {
      background: #818cf8;
    }
  </style>
</head>
<body>
  <div class="success-card">
    <div class="checkmark">✓</div>
    <h1>Welcome to GutCheck Premium!</h1>
    <p>Your payment was successful. You now have unlimited access to biometric authenticity analysis and the full dashboard.</p>
    <a href="/analyze.html" class="btn">Start Analyzing</a>
  </div>
</body>
</html>
